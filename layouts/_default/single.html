{{ define "main" }}
<div class="mx-auto py-12">
    <div class="container max-w-3xl mx-auto p-8 border border-border-primary-light dark:border-border-primary-dark rounded-2xl bg-neutral-50 dark:bg-neutral-800">
        <h1 class="text-4xl font-bold mb-4 text-text-primary-light dark:text-text-primary-dark">{{ .Title }}</h1>
        {{ if eq .Section "blogs" }}
            <div class="flex items-center gap-4 mb-8 text-text-secondary-light dark:text-text-secondary-dark">
                <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
                <div class="flex gap-2">
                    {{ range .Params.tags }}
                    <span class="px-2 py-1 bg-bg-primary-light dark:bg-bg-tertiary-dark rounded-md text-xs font-medium text-text-secondary-light dark:text-text-secondary-dark">{{ . }}</span>
                    {{ end }}
                </div>
            </div>
        {{ end }}
        
        <div class="prose prose-invert max-w-none">
            {{ .Content }}
        </div>
    </div>
</div>

<style>
    .container {
        background-color: #f5f5f5;
    }
    html.dark .container {
        background-color: #272727;
    }
    .prose {
        color: #4b5563; /* text-secondary-light */
    }
    html.dark .prose {
        color: #f3f4f6; /* text-secondary-dark */
    }
    .prose h1 {
        font-size: 2rem;
        color: #1f2937; /* text-primary-light */
    }
    html.dark .prose h1 {
        color: #f3f4f6; /* text-primary-dark */
    }
    .prose h2 {
        font-size: 1.5rem;
        color: #1f2937; /* text-primary-light */
    }
    html.dark .prose h2 {
        color: #f3f4f6; /* text-primary-dark */
    }
    .prose h3 {
        font-size: 1.2rem;
        color: #1f2937; /* text-primary-light */
    }
    html.dark .prose h3 {
        color: #f3f4f6; /* text-primary-dark */
    }
    .prose p {
        color: #1f2937; /* text-primary-light */
        margin-bottom: 1.5rem; /* mb-6 */
        line-height: 1.9;
    }
    html.dark .prose p {
        color: #f3f4f6; /* text-primary-dark */
    }
    .prose code {
        color: #1f2937; /* text-primary-light */
        background-color: #FFFFFF;
    }
    html.dark .prose code {
        color: #f3f4f6; /* text-primary-dark */
        background-color: #121212;
    }
    .prose .highlight {
        margin-bottom: 1.5rem;
    }
    .prose span {
        font-size: 0.8rem;
        padding-left: 0.25rem;
        color: #1f2937; /* text-primary-light */
        background-color: #FFFFFF;
    }
    html.dark .prose span {
        color: #f3f4f6; /* text-primary-dark */
        background-color: #121212;
    }
    .prose blockquote {
        padding: 0.5rem;
        margin-bottom: 1.5rem; 
        border-width: 1px;
        border-radius: 0.5rem;
        background-color: #f5d6d8;
        border-color: #FF0000;
    }
    .prose blockquote p {
        margin-bottom: 0;
    }
    html.dark .prose blockquote {
        background-color: #3b0511;
        border-color: #FF0000;
    }
    .prose ul {
        list-style-type: disc;
        list-style-position: inside;
        padding-bottom: 2rem;
    }
    .prose a {
        text-decoration: underline;
    }
    .prose a:hover {
        color: #0284c7; /* accent-light */
    }
    html.dark .prose a:hover {
        color: #0ea5e9; /* accent-dark */
    }
</style>
{{ end }}
